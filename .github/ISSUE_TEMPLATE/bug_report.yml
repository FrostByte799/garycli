name: 🐛 Bug Report
description: 报告一个可复现的问题 / Report a reproducible bug
title: "[Bug] "
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        感谢你花时间报告 Bug！请尽量填写完整，这能帮助我们更快定位问题。
        Thanks for taking the time to report this! The more detail you provide, the faster we can fix it.

  - type: dropdown
    id: os
    attributes:
      label: 操作系统 / OS
      options:
        - Linux
        - macOS
        - Windows
        - WSL
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python 版本 / Python Version
      placeholder: "e.g. 3.11.2"
    validations:
      required: true

  - type: input
    id: chip
    attributes:
      label: 芯片型号 / Chip Model
      placeholder: "e.g. STM32F103C8T6"

  - type: dropdown
    id: ai-backend
    attributes:
      label: AI 后端 / AI Backend
      options:
        - DeepSeek
        - Kimi / Moonshot
        - OpenAI
        - Google Gemini
        - Tongyi Qianwen
        - Zhipu GLM
        - Ollama
        - Other
    validations:
      required: true

  - type: textarea
    id: doctor-output
    attributes:
      label: gary doctor 输出 / Output of `gary doctor`
      render: shell
      placeholder: 请粘贴 `gary doctor` 的完整输出

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤 / Steps to Reproduce
      placeholder: |
        1. 运行命令 ...
        2. 输入 ...
        3. 出现 ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期行为 / Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为 / Actual Behavior
      render: shell
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: 附加信息 / Additional Context
      placeholder: 截图、日志片段、硬件配置等
